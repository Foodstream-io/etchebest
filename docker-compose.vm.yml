services:
  postgres:
    image: postgres:16-alpine
    container_name: db-foodstream
    restart: unless-stopped
    env_file: .env
    ports:
      - '${POSTGRES_PORT}:${POSTGRES_PORT}'
    networks:
      - back-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    container_name: backend-foodstream
    depends_on:
      - postgres
    build: ./backend
    env_file: ./.env
    network_mode: "host"
    environment:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      BACKEND_PORT: ${BACKEND_PORT}
      STUN_SERVER_URL: ${STUN_SERVER_URL}
      WEBRTC_IP: ${WEBRTC_IP:-127.0.0.1}

  frontend:
    container_name: frontend-foodstream
    depends_on:
      - backend
    build:
      context: ./front-web
      dockerfile: Dockerfile
    network_mode: "host"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://${VM_IP}:8081/api
    restart: unless-stopped


volumes:
  postgres_data:
    driver: local

networks:
  back-network:
    driver: bridge
